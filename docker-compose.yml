services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - FAKE_GENERATOR=1
      - PORT=3000
      # Uncomment and set a real key + run Blender with blender-mcp to enable live generation:
      # - FAKE_GENERATOR=0
      # - OPENAI_API_KEY=sk-...
      # - OPENAI_MODEL=gpt-4.1
    restart: unless-stopped
